# Weather Agent Example
# Phase 1: Simple weather query agent
# S5: Updated with multi-provider routing and Intent collaboration

agent_id = "com.example.weather"
version = "1.0.0"
name = "Weather Agent"
description = "A weather query agent that remembers your city preference and can collaborate with calendar agent"
author = "Rollball Team"
runtime_version = "0.1.0"
system = false
dev = false

identity_deps = ["city"]

[[permissions]]
type = "Network"
value = "https://wttr.in"

[[permissions]]
type = "MemoryRead"

[[permissions]]
type = "MemoryWrite"

[[permissions]]
type = "IntentSend"

[[tools]]
name = "http_request"

[[tools]]
name = "memory_store"

[[tools]]
name = "memory_recall"

[[tools]]
name = "intent_send"

[llm]
suggested_provider = "openai"
suggested_model = "gpt-4"
temperature = 0.7

[llm.providers.openai]
model = "gpt-4o"
api_key_ref = "vault:openai_key"

[llm.providers.claude]
model = "claude-sonnet-4"
api_key_ref = "vault:anthropic_key"

[llm.routing]
strategy = "cost_priority"
fallback_order = ["openai", "claude"]

[llm.budget]
max_output_tokens = 2048
exceeded_action = "warn"

[memory]
enabled = true
retention_days = 30

[resources]
max_memory_mb = 256
idle_timeout_secs = 3600

[sandbox]
enabled = false

[capabilities.weather_query]
description = "Query weather for a location"
